<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Theft Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0b1120">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --accent: #0ea5e9;
    --accent-dim: #0c4a6e;
    --accent-glow: rgba(14, 165, 233, 0.15);
    --bg: #0b1120;
    --card: #141c2e;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --armed: #22c55e;
    --armed-bg: #052e16;
    --armed-text: #bbf7d0;
    --disarmed: #ef4444;
    --disarmed-bg: #450a0a;
    --disarmed-text: #fecaca;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* Login */
  #login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #login form { background: var(--card); padding: 2rem; border-radius: var(--radius); width: 320px; border: 1px solid var(--border); }
  #login h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text); font-size: 1.25rem; font-weight: 700; }
  #login input { width: 100%; padding: 0.7rem 0.85rem; margin-bottom: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.9rem; font-family: inherit; }
  #login input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #login button { width: 100%; padding: 0.7rem; border: none; border-radius: var(--radius-sm); background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  #login button:hover { background: #0284c7; }
  #login-error { color: var(--disarmed); text-align: center; margin-top: 0.5rem; display: none; font-size: 0.85rem; }

  /* Dashboard */
  #dashboard { display: none; max-width: 960px; margin: 0 auto; padding: 1rem; }

  /* Header */
  .dash-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .dash-header h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); white-space: nowrap; }
  .status-pill { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }
  .pill-armed { background: var(--armed-bg); color: var(--armed-text); border: 1px solid var(--armed); }
  .pill-disarmed { background: var(--disarmed-bg); color: var(--disarmed-text); border: 1px solid var(--disarmed); }
  .pill-unknown { background: var(--border); color: var(--text-muted); border: 1px solid var(--text-muted); }
  .pill-pending { background: #1a1a2e; color: #facc15; border: 1px solid #facc15; animation: pillPulse 1.5s ease-in-out infinite; }
  .pill-offline { background: #1e293b; color: #475569; border: 1px solid #334155; }
  .last-seen { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
  .last-seen.offline { color: #ef4444; }

  .pill-ign-ok { background: var(--armed-bg); color: var(--armed-text); border: 1px solid var(--armed); }
  .pill-ign-cut { background: var(--disarmed-bg); color: var(--disarmed-text); border: 1px solid var(--disarmed); }

  .pill-speed-green { background: var(--armed-bg); color: var(--armed-text); border: 1px solid var(--armed); }
  .pill-speed-red { background: var(--disarmed-bg); color: var(--disarmed-text); border: 1px solid var(--disarmed); }
  .pill-speed-gray { background: #1e293b; color: #475569; border: 1px solid #334155; }

  .status-pill.confirming { animation: pillPulse 0.6s ease-in-out; }
  @keyframes pillPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Offline banner */
  .offline-banner { display: none; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
  .offline-banner a { color: var(--accent); text-decoration: none; }
  .offline-banner a:hover { text-decoration: underline; }

  /* Safety Lockout banner */
  .safety-lockout-banner { background: #991b1b; border: 1px solid #dc2626; border-radius: var(--radius-sm); padding: 0.75rem 2.5rem 0.75rem 1rem; margin-bottom: 0.75rem; font-size: 0.85rem; color: #fff; line-height: 1.5; position: relative; }
  .safety-lockout-dismiss { position: absolute; top: 0.5rem; right: 0.75rem; background: none; border: none; color: #fecaca; font-size: 1.2rem; cursor: pointer; padding: 0; line-height: 1; }
  .safety-lockout-dismiss:hover { color: #fff; }

  /* Hero Row */
  .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .hero-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .hero-card-label { padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  #map { height: 280px; z-index: 0; }
  .hero-photo { position: relative; min-height: 280px; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .hero-photo-placeholder { color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 1rem; }
  .hero-photo img { width: 100%; height: 280px; object-fit: cover; cursor: zoom-in; display: block; }
  .hero-photo .ai-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.5rem 0.75rem; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
  .hero-photo .ai-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
  .hero-photo .photo-meta { font-size: 0.7rem; color: rgba(255,255,255,0.7); margin-top: 0.25rem; }
  .ai-high { background: #991b1b; color: #fca5a5; }
  .ai-medium { background: #854d0e; color: #fde047; }
  .ai-low { background: #14532d; color: #86efac; }
  .ai-loading { background: rgba(30,41,59,0.9); color: #94a3b8; }

  /* Speed Widget */
  .speed-widget { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; padding: 1rem; }
  .speed-number { font-size: 3.5rem; font-weight: 700; line-height: 1; }
  .speed-unit { font-size: 1rem; color: var(--text-secondary); margin-top: 0.25rem; font-weight: 600; }
  .speed-motion-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; margin-top: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .speed-pill-stationary { background: var(--armed-bg); color: var(--armed-text); border: 1px solid var(--armed); }
  .speed-pill-moving { background: var(--disarmed-bg); color: var(--disarmed-text); border: 1px solid var(--disarmed); }
  .speed-pill-unknown { background: var(--border); color: var(--text-muted); border: 1px solid var(--text-muted); }
  .speed-pill-stale { background: #1e293b; color: #475569; border: 1px solid #334155; }
  .speed-updated { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center; }
  .speed-stale-sub { color: #64748b; }

  /* Action Bar */
  .action-bar { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .btn-group { display: flex; gap: 0.35rem; flex: 1; }
  .action-bar button { flex: 1; padding: 0.6rem 0.5rem; border: none; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
  .action-bar button:hover { opacity: 0.85; }
  .action-bar button:active { transform: scale(0.97); }
  .action-bar button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-arm { background: var(--armed); color: #052e16; }
  .btn-disarm { background: var(--disarmed); color: #fff; }
  .btn-gps { background: var(--accent); color: #fff; }
  .btn-photo { background: #7c3aed; color: #fff; }
  .btn-immobilize { background: #dc2626; color: #fff; }
  .btn-immobilize.stale-warn { background: #ca8a04; }
  .btn-restore { background: #16a34a; color: #fff; }

  /* Immobilize warning */
  .immobilize-warning { background: rgba(234, 179, 8, 0.1); border: 1px solid #ca8a04; border-radius: var(--radius-sm); padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; font-size: 0.8rem; color: #fbbf24; line-height: 1.4; }

  /* Optimistic UI */
  .action-bar button .spinner { display: inline-block; width: 0.85em; height: 0.85em; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 0.25rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .action-bar button.pending { opacity: 0.65; cursor: wait; }
  .action-bar button.failed { outline: 2px solid var(--disarmed); outline-offset: -2px; }

  /* Event Feed */
  .feed-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .feed-header { padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  #feed-list { max-height: 400px; overflow-y: auto; }
  .feed-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); animation: fadeIn 0.25s ease-out; }
  .feed-item:last-child { border-bottom: none; }
  .feed-item.urgent { background: rgba(239, 68, 68, 0.06); }
  .feed-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; min-width: 52px; padding-top: 0.1rem; }
  .feed-content { flex: 1; min-width: 0; }
  .feed-reason { font-weight: 600; font-size: 0.85rem; color: var(--text); }
  .feed-body { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.15rem; white-space: pre-wrap; word-break: break-word; }
  .feed-body a { color: var(--accent); text-decoration: none; }
  .feed-body a:hover { text-decoration: underline; }
  .feed-badges { display: flex; gap: 0.35rem; margin-top: 0.3rem; flex-wrap: wrap; }
  .feed-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
  .feed-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: cover; cursor: zoom-in; flex-shrink: 0; }
  .feed-empty { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Lightbox */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 10000; cursor: zoom-out; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: var(--radius-sm); }

  /* Toast */
  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent-dim); color: #e0f2fe; padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  #toast.show { opacity: 1; }

  /* Scrollbar */
  #feed-list::-webkit-scrollbar { width: 4px; }
  #feed-list::-webkit-scrollbar-track { background: transparent; }
  #feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Confirm Dialog */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9000; }
  .confirm-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; max-width: 340px; text-align: center; }
  .confirm-card p { margin-bottom: 1rem; font-size: 0.9rem; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 0.5rem; }
  .confirm-btns button { flex: 1; padding: 0.6rem; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
  .btn-confirm-yes { background: var(--disarmed); color: #fff; }
  .btn-confirm-no { background: var(--border); color: var(--text); }
  .confirm-warning { background: rgba(234, 179, 8, 0.15); border: 1px solid #ca8a04; border-radius: var(--radius-sm); padding: 0.5rem; margin-bottom: 0.75rem; font-size: 0.8rem; color: #fbbf24; line-height: 1.4; text-align: left; }

  /* Mobile */
  @media (max-width: 640px) {
    #dashboard { padding: 0.5rem; }
    .hero-row { grid-template-columns: 1fr; }
    #map { height: 220px; }
    .hero-photo, .hero-photo img { min-height: 200px; height: 200px; }
    .speed-widget { min-height: 200px; }
    .action-bar { flex-wrap: wrap; }
    .btn-group { flex: 1 1 45%; }
    .action-bar button { padding: 0.7rem 0.4rem; font-size: 0.78rem; }
    .dash-header h1 { font-size: 0.95rem; }
  }
  @media (max-width: 380px) {
    .dash-header { flex-wrap: wrap; gap: 0.4rem; }
    .last-seen { margin-left: 0; }
    .btn-group { flex: 1 1 100%; }
    .feed-thumb { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login">
  <form id="login-form">
    <h2>Anti-Theft System</h2>
    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Login</button>
    <p id="login-error">Invalid credentials</p>
  </form>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <h1>Anti-Theft Dashboard</h1>
    <span id="status-pill" class="status-pill pill-unknown">Unknown</span>
    <span id="ignition-pill" class="status-pill pill-ign-ok">IGNITION OK</span>
    <span id="speed-pill" class="status-pill pill-speed-gray">&mdash; mph</span>
    <span id="last-seen" class="last-seen"></span>
    <span id="push-controls" style="display:none;white-space:nowrap">
      <button id="push-bell" onclick="togglePush()" style="background:none;border:1px solid #1e293b;border-radius:6px;color:#94a3b8;font-size:0.7rem;padding:0.25rem 0.5rem;cursor:pointer;font-family:inherit">🔔 Enable notifications</button>
      <button id="push-test" onclick="sendPushTest()" style="display:none;background:none;border:1px solid #1e293b;border-radius:6px;color:#94a3b8;font-size:0.7rem;padding:0.25rem 0.5rem;cursor:pointer;font-family:inherit">Send test</button>
    </span>
    <span id="push-hint" style="display:none;font-size:0.7rem;color:#64748b;white-space:nowrap"></span>
  </div>

  <div id="offline-banner" class="offline-banner"></div>
  <div id="safety-lockout-banner" class="safety-lockout-banner" style="display:none">
    <span id="safety-lockout-text"></span>
    <button class="safety-lockout-dismiss" onclick="dismissSafetyLockout()">&times;</button>
  </div>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-card-label">Live Map</div>
      <div id="map"></div>
    </div>
    <div class="hero-card">
      <div class="hero-card-label">Last Photo</div>
      <div id="hero-photo" class="hero-photo">
        <div class="hero-photo-placeholder">No photos yet</div>
      </div>
    </div>
    <div class="hero-card">
      <div class="hero-card-label">Speed</div>
      <div id="speed-widget" class="speed-widget">
        <div id="speed-number" class="speed-number" style="color:#64748b">&mdash;</div>
        <div class="speed-unit">mph</div>
        <div id="speed-motion-pill" class="speed-motion-pill speed-pill-unknown">Unknown</div>
        <div id="speed-updated" class="speed-updated">No data</div>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <div class="btn-group">
      <button id="btn-arm" class="btn-arm" onclick="sendCommand('ARM', this)">Arm</button>
      <button id="btn-disarm" class="btn-disarm" onclick="sendCommand('DISARM', this)">Disarm</button>
    </div>
    <div class="btn-group">
      <button id="btn-gps" class="btn-gps" onclick="sendCommand('GPS', this)">GPS</button>
      <button id="btn-photo" class="btn-photo" onclick="sendCommand('PHOTO', this)">Photo</button>
    </div>
    <div class="btn-group">
      <button id="btn-immobilize" class="btn-immobilize" onclick="confirmImmobilize()">Immobilize</button>
      <button id="btn-restore" class="btn-restore" onclick="confirmRestore()">Restore</button>
    </div>
  </div>
  <div id="immobilize-warning" class="immobilize-warning" style="display:none"></div>

  <div class="feed-section">
    <div class="feed-header">Events</div>
    <div id="feed-list">
      <div class="feed-empty">No events yet</div>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-dialog" class="confirm-overlay" style="display:none">
  <div class="confirm-card">
    <div id="confirm-warning" class="confirm-warning" style="display:none"></div>
    <p id="confirm-text"></p>
    <div class="confirm-btns">
      <button id="confirm-yes" class="btn-confirm-yes">Confirm</button>
      <button id="confirm-no" class="btn-confirm-no">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="config.js"></script>
<script>
if (!window.MQTT_CONFIG) { console.warn('[mqtt] config.js missing — MQTT disabled, using HTTP fallback'); }
const ALERT_TOPIC = 'antitheft-gonnie-2219';
const WORKER_URL = 'https://antitheft-whatsapp-bridge.gonnie2219.workers.dev';
const EXPECTED_HASH = '90508d9e1b28c32e484c03679d4939618ae1c31424a25a5f0483a93012be0a42';
const VAPID_PUBLIC_KEY = 'BAEaWU5rTz4gL4Ksprzmr3VLWWEFR4cr9ZfZkmbhuvQwT2WpM8PGjXeKCqIXH2chOpOe1WZgFTOuBCu6ZYKJ-sA';
var CMD_SECRET = ''; // set on login, sent with all command requests

// MQTT-over-WebSocket: publish commands directly to HiveMQ so the LILYGO
// receives them in ~2-5s instead of the 40-60s HTTP-poll path.
// Credentials loaded from config.js (gitignored).
var mqttClient = null;

function initMqtt() {
  if (!window.MQTT_CONFIG) return;
  if (typeof mqtt === 'undefined') {
    console.warn('[mqtt] mqtt.js not loaded (CDN blocked?), using HTTP fallback');
    return;
  }
  try {
    mqttClient = mqtt.connect(window.MQTT_CONFIG.wssUrl, {
      username: window.MQTT_CONFIG.pubUser,
      password: window.MQTT_CONFIG.pubPass,
      clientId: 'antitheft-dashboard-' + Math.random().toString(16).slice(2, 10),
      clean: true,
      connectTimeout: 8000,
      reconnectPeriod: 4000,
      keepalive: 30
    });
    mqttClient.on('connect', function() { console.log('[mqtt] connected'); });
    mqttClient.on('error', function(err) { console.warn('[mqtt] error:', err.message); });
    mqttClient.on('close', function() { console.warn('[mqtt] disconnected'); });
  } catch (e) {
    console.warn('[mqtt] init failed:', e.message);
    mqttClient = null;
  }
}

// Register the push-only service worker. try/catch keeps environments
// without SW support (e.g. the Expo WebView) completely unaffected.
try {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
} catch (e) { /* no service worker support — fine */ }

// --- Auth ---
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const data = new TextEncoder().encode(user + ':' + pass);
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

  if (hash === EXPECTED_HASH) {
    // Derive CMD_SECRET from credentials — SHA-256 of "cmd:" + pass
    // Must match the CMD_SECRET set via `wrangler secret put CMD_SECRET`
    var secretData = new TextEncoder().encode('cmd:' + pass);
    var secretBuf = await crypto.subtle.digest('SHA-256', secretData);
    CMD_SECRET = Array.from(new Uint8Array(secretBuf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initDashboard();
    initPushUI();
    initMqtt();
    setTimeout(function() { if (map) map.invalidateSize(); }, 200);
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
});

// --- Web Push (PWA notifications) ---
function urlBase64ToUint8Array(base64) {
  var padding = '='.repeat((4 - (base64.length % 4)) % 4);
  var raw = atob((base64 + padding).replace(/-/g, '+').replace(/_/g, '/'));
  var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function setPushHint(text) {
  var hint = document.getElementById('push-hint');
  hint.textContent = text;
  hint.style.display = text ? 'inline' : 'none';
}

function setBellState(subscribed) {
  var bell = document.getElementById('push-bell');
  var test = document.getElementById('push-test');
  bell.textContent = subscribed ? '🔔 Notifications on' : '🔔 Enable notifications';
  bell.style.color = subscribed ? '#22c55e' : '#94a3b8';
  test.style.display = subscribed ? 'inline-block' : 'none';
}

async function initPushUI() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    // iOS Safari exposes the Push API only inside an installed home-screen
    // app — outside it, point the user at Add to Home Screen.
    var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    var standalone = window.navigator.standalone === true ||
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    if (isIOS && !standalone) setPushHint('For push alerts: Share → Add to Home Screen, then open the app');
    return;
  }
  document.getElementById('push-controls').style.display = 'inline';
  try {
    var reg = await navigator.serviceWorker.ready;
    var sub = await reg.pushManager.getSubscription();
    setBellState(!!sub);
  } catch (e) {
    setBellState(false);
  }
}

async function togglePush() {
  try {
    var reg = await navigator.serviceWorker.ready;
    var sub = await reg.pushManager.getSubscription();

    if (sub) {
      // Unsubscribe
      await fetch(WORKER_URL + '/push/unsubscribe', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + CMD_SECRET, 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint: sub.endpoint })
      });
      await sub.unsubscribe();
      setBellState(false);
      setPushHint('');
      return;
    }

    // Subscribe — requestPermission must run inside this user gesture (iOS)
    var perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      setPushHint('Notifications blocked — re-enable in Settings > Notifications');
      return;
    }
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    var resp = await fetch(WORKER_URL + '/push/subscribe', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + CMD_SECRET, 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });
    if (resp.ok) {
      setBellState(true);
      setPushHint('');
    } else {
      await sub.unsubscribe();
      setPushHint('Subscribe failed (' + resp.status + ')');
    }
  } catch (e) {
    setPushHint('Push setup failed: ' + e.message);
  }
}

async function sendPushTest() {
  try {
    var resp = await fetch(WORKER_URL + '/push/test', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + CMD_SECRET }
    });
    var data = await resp.json();
    setPushHint(resp.ok ? 'Test sent to ' + data.delivered + ' device(s)' : 'Test failed');
    setTimeout(function() { setPushHint(''); }, 4000);
  } catch (e) {
    setPushHint('Test failed: ' + e.message);
  }
}

// --- Dashboard ---
let map, marker;
let gpsTrail = [];
let trailLine = null;
let lastMessageTime = null;
var pillState = {
  status: 'UNKNOWN', statusTs: 0,
  ignition: 'UNKNOWN', ignitionTs: 0,
  pendingStatus: null, pendingIgnition: null,
  offline: false
};
const seenMsgIds = new Set();

// Speed / motion state
let currentSpeedMph = null;
let motionState = null;
let speedUpdatedAt = null;
let safetyLockoutTimer = null;

function initDashboard() {
  map = L.map('map', { zoomControl: false }).setView([42.35, -83.07], 13);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
  }).addTo(map);

  // Restore non-pill persisted state; pills start UNKNOWN (seeded by loadHistory R6)
  var savedTime = localStorage.getItem('lastMessageTime');
  if (savedTime) lastMessageTime = parseInt(savedTime);
  renderPills();

  var savedGPS = localStorage.getItem('lastGPS');
  if (savedGPS) {
    var parts = savedGPS.split(',');
    var lat = parseFloat(parts[0]), lon = parseFloat(parts[1]);
    if (!isNaN(lat) && !isNaN(lon)) {
      marker = L.circleMarker([lat, lon], { radius: 7, color: '#0ea5e9', fillColor: '#0ea5e9', fillOpacity: 0.9, weight: 2 }).addTo(map);
      map.setView([lat, lon], 15);
    }
  }

  var savedTrail = localStorage.getItem('gpsTrail');
  if (savedTrail) {
    try { gpsTrail = JSON.parse(savedTrail); } catch(e) { gpsTrail = []; }
    if (gpsTrail.length > 1) {
      trailLine = L.polyline(gpsTrail, { color: '#0ea5e9', weight: 2, opacity: 0.4, dashArray: '4 6' }).addTo(map);
    }
  }

  // Restore speed/motion state
  var savedSpeedMph = localStorage.getItem('currentSpeedMph');
  if (savedSpeedMph !== null && savedSpeedMph !== '') {
    currentSpeedMph = parseFloat(savedSpeedMph);
    if (isNaN(currentSpeedMph)) currentSpeedMph = null;
  }
  motionState = localStorage.getItem('motionState') || null;
  var savedSpeedTs = localStorage.getItem('speedUpdatedAt');
  if (savedSpeedTs) speedUpdatedAt = parseInt(savedSpeedTs);
  updateSpeedWidget();
  updateSpeedPill();
  updateImmobilizeButton();

  checkOfflineStatus();
  updateLastSeen();

  // Load recent history from ntfy, then open SSE for live updates
  loadHistory().then(function() {
    checkOfflineStatus();
    updateLastSeen();

    var evtSource = new EventSource('https://ntfy.sh/' + ALERT_TOPIC + '/sse');
    evtSource.addEventListener('message', function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.event !== 'message') return;
        handleNotification(msg);
      } catch (err) { /* ignore non-JSON */ }
    });
    evtSource.onerror = function() { showToast('Connection lost \u2014 reconnecting\u2026'); };
    evtSource.onopen = function() { showToast('Connected'); };
  });

  setInterval(checkOfflineStatus, 30000);
  setInterval(updateLastSeen, 30000);
  setInterval(pollWorkerStatus, 5000);
  setInterval(updateSpeedWidget, 10000);
  setInterval(updateImmobilizeButton, 10000);
  pollWorkerStatus();
}

async function loadHistory() {
  var latestStatusValue = null, latestStatusTs = 0;
  var latestIgnitionValue = null, latestIgnitionTs = 0;
  try {
    var resp = await fetch('https://ntfy.sh/' + ALERT_TOPIC + '/json?poll=1&since=24h');
    if (!resp.ok) return;
    var text = await resp.text();
    var lines = text.trim().split('\n');
    for (var i = 0; i < lines.length; i++) {
      try {
        var msg = JSON.parse(lines[i]);
        if (msg.event !== 'message') continue;
        // Track latest System state message for pill seeding (R6)
        var hBody = (msg.message || '').toLowerCase();
        var hTs = (msg.time || 0) * 1000;
        if (hBody.startsWith('system armed') && hTs > latestStatusTs) { latestStatusValue = 'ARMED'; latestStatusTs = hTs; }
        else if (hBody.startsWith('system disarmed') && hTs > latestStatusTs) { latestStatusValue = 'DISARMED'; latestStatusTs = hTs; }
        else if (hBody.startsWith('system immobilized') && hTs > latestIgnitionTs) { latestIgnitionValue = 'IMMOBILIZED'; latestIgnitionTs = hTs; }
        else if (hBody.startsWith('system ignition_ok') && hTs > latestIgnitionTs) { latestIgnitionValue = 'OK'; latestIgnitionTs = hTs; }
        handleNotification(msg, true);
      } catch(e) {}
    }
  } catch(e) {
    console.error('[History]', e);
  }
  // R6: Seed pill state from history (kv-tier authority)
  if (latestStatusValue) applyObservation({type:'kv', statusValue:latestStatusValue, ignitionValue:pillState.ignition, ts:latestStatusTs});
  if (latestIgnitionValue) applyObservation({type:'kv', statusValue:pillState.status, ignitionValue:latestIgnitionValue, ts:latestIgnitionTs});
}

async function pollWorkerStatus() {
  try {
    var resp = await fetch(WORKER_URL + '/status');
    if (!resp.ok) return;
    var data = await resp.json();
    if (!data.ts) return;
    applyObservation({
      type: 'kv',
      statusValue: data.armed ? 'ARMED' : 'DISARMED',
      ignitionValue: data.immobilized ? 'IMMOBILIZED' : 'OK',
      ts: data.ts
    });
  } catch(e) {}
}

function handleNotification(msg, historical) {
  if (msg.id) {
    if (seenMsgIds.has(msg.id)) return;
    seenMsgIds.add(msg.id);
    if (seenMsgIds.size > 200) {
      const iter = seenMsgIds.values();
      for (let i = 0; i < 100; i++) seenMsgIds.delete(iter.next().value);
    }
  }

  if (historical && msg.time) {
    var msgTime = msg.time * 1000;
    if (!lastMessageTime || msgTime > lastMessageTime) {
      lastMessageTime = msgTime;
      localStorage.setItem('lastMessageTime', lastMessageTime);
    }
  } else if (!historical) {
    lastMessageTime = Date.now();
    localStorage.setItem('lastMessageTime', lastMessageTime);
  }

  const title = msg.title || '';
  const body = msg.message || '';
  const priority = msg.priority || 3;
  const tags = msg.tags || [];
  const attachment = msg.attachment || null;

  // --- Status Update: silent consumption, no feed item ---
  // Detect by body content (SIM7600 HTTPINIT strips Title/Priority headers)
  if (body.indexOf('SPEED:') >= 0 && body.indexOf('MOTION:') >= 0) {
    var suLines = body.split('\n');
    var suLat = null, suLon = null;
    for (var si = 0; si < suLines.length; si++) {
      var suLine = suLines[si];
      if (suLine.startsWith('SPEED:')) {
        var sv = parseFloat(suLine.substring(6));
        currentSpeedMph = (isNaN(sv) || sv < 0) ? null : sv;
      } else if (suLine.startsWith('MOTION:')) {
        motionState = suLine.substring(7).trim() || null;
      } else if (suLine.startsWith('LAT:') && suLine.length > 4) {
        var lv = parseFloat(suLine.substring(4));
        if (!isNaN(lv)) suLat = lv;
      } else if (suLine.startsWith('LON:') && suLine.length > 4) {
        var lnv = parseFloat(suLine.substring(4));
        if (!isNaN(lnv)) suLon = lnv;
      }
    }
    speedUpdatedAt = (historical && msg.time) ? msg.time * 1000 : Date.now();
    localStorage.setItem('currentSpeedMph', currentSpeedMph !== null ? String(currentSpeedMph) : '');
    localStorage.setItem('motionState', motionState || '');
    localStorage.setItem('speedUpdatedAt', String(speedUpdatedAt));
    updateSpeedWidget();
    updateSpeedPill();
    updateImmobilizeButton();
    if (suLat !== null && suLon !== null) updateMapPosition(suLat, suLon);
    // Status-push with coords clears a pending GPS command
    if (!historical && pendingAction && pendingAction.cmd === 'GPS' && suLat !== null && suLon !== null) {
      console.log('[CmdClear] GPS cleared by status-push coords:', suLat, suLon);
      confirmAction();
    }
    if (motionState === 'STATIONARY') dismissSafetyLockout();
    return;
  }

  // --- Safety Lockout: show banner + fall through to feed ---
  // Detect by body content (SIM7600 HTTPINIT strips Title header)
  if (body.indexOf('Immobilize refused') >= 0 && !historical) {
    showSafetyLockout(body);
  }

  var bodyLower = body.toLowerCase();

  // --- Reply-gated pending-command clearing (GPS/PHOTO/STATUS only) ---
  // Pill commands (ARM/DISARM/IMMOBILIZE/RESTORE) are resolved by applyObservation R1/R2.
  if (!historical && pendingAction) {
    var matched = false;
    if (pendingAction.cmd === 'GPS') {
      if (body.indexOf('Location:') >= 0 || body.indexOf('SMS_REPLY: GPS:') >= 0) {
        console.log('[CmdClear] GPS cleared by SSE body:', body.slice(0, 120));
        matched = true;
      }
    }
    if (pendingAction.cmd === 'PHOTO') {
      if (attachment || body.indexOf('Photo') >= 0 || (body.indexOf('SMS_REPLY:') >= 0 && body.toLowerCase().indexOf('photo') >= 0)) {
        console.log('[CmdClear] PHOTO cleared by SSE body:', body.slice(0, 120), 'attachment:', !!attachment);
        matched = true;
      }
    }
    if (pendingAction.cmd === 'STATUS') {
      if (body.indexOf('SMS_REPLY:') >= 0 || bodyLower.indexOf('armed') >= 0 || bodyLower.indexOf('disarmed') >= 0) {
        console.log('[CmdClear] STATUS cleared by SSE body:', body.slice(0, 120));
        matched = true;
      }
    }
    if (matched) confirmAction();
  }

  // --- Always-on live state reconcile (R1) ---
  // Authoritative "System X" messages → applyObservation, which clears
  // any relevant pending + confirms the button via confirmAction().
  if (!historical) {
    var obsTs = msg.time * 1000;
    if (bodyLower.startsWith('system armed'))            applyObservation({type:'sse_live', dim:'status', value:'ARMED', ts:obsTs});
    else if (bodyLower.startsWith('system disarmed'))    applyObservation({type:'sse_live', dim:'status', value:'DISARMED', ts:obsTs});
    else if (bodyLower.startsWith('system immobilized')) applyObservation({type:'sse_live', dim:'ignition', value:'IMMOBILIZED', ts:obsTs});
    else if (bodyLower.startsWith('system ignition_ok')) applyObservation({type:'sse_live', dim:'ignition', value:'OK', ts:obsTs});
  }

  const locMatch = body.match(/Location:\s*([-\d.]+),([-\d.]+)/);
  if (locMatch) {
    const lat = parseFloat(locMatch[1]);
    const lon = parseFloat(locMatch[2]);
    if (!isNaN(lat) && !isNaN(lon)) {
      updateMapPosition(lat, lon);
    }
  }

  var feedTs = (historical && msg.time) ? msg.time * 1000 : null;
  const feedItem = addFeedItem(title, body, priority, attachment, feedTs);

  if (attachment && attachment.url) {
    showHeroPhoto(attachment.url, title, body, historical ? feedTs : null);
  }

  if (!historical) {
    if (attachment && attachment.url && attachment.name && /\.jpe?g$/i.test(attachment.name)) {
      analyzePhoto(attachment.url, feedItem);
    }

  }
}

function renderPills() {
  var sp = document.getElementById('status-pill');
  var ip = document.getElementById('ignition-pill');

  // Status pill — offline visual override (does NOT mutate pillState.status)
  if (pillState.offline) {
    sp.textContent = 'OFFLINE';
    sp.className = 'status-pill pill-offline';
  } else if (pillState.pendingStatus) {
    sp.textContent = pillState.pendingStatus.cmd === 'ARM' ? 'ARMING...' : 'DISARMING...';
    sp.className = 'status-pill pill-pending';
  } else if (pillState.status === 'ARMED') {
    sp.textContent = 'ARMED';
    sp.className = 'status-pill pill-armed';
  } else if (pillState.status === 'DISARMED') {
    sp.textContent = 'DISARMED';
    sp.className = 'status-pill pill-disarmed';
  } else {
    sp.textContent = 'Unknown';
    sp.className = 'status-pill pill-unknown';
  }

  // Ignition pill — offline shows neutral/unknown (does NOT mutate pillState.ignition)
  if (pillState.offline) {
    ip.textContent = 'Unknown';
    ip.className = 'status-pill pill-unknown';
  } else if (pillState.pendingIgnition) {
    ip.textContent = pillState.pendingIgnition.cmd === 'IMMOBILIZE' ? 'IMMOBILIZING...' : 'RESTORING...';
    ip.className = 'status-pill pill-pending';
  } else if (pillState.ignition === 'IMMOBILIZED') {
    ip.textContent = 'IMMOBILIZED';
    ip.className = 'status-pill pill-ign-cut';
  } else if (pillState.ignition === 'OK') {
    ip.textContent = 'IGNITION OK';
    ip.className = 'status-pill pill-ign-ok';
  } else {
    ip.textContent = 'Unknown';
    ip.className = 'status-pill pill-unknown';
  }

  updateLastSeen();
}

function applyObservation(obs) {
  if (obs.type === 'sse_live') {
    // R1: Live SSE "System X" — highest authority
    var dim = obs.dim;
    var pendingKey = dim === 'status' ? 'pendingStatus' : 'pendingIgnition';
    pillState[dim] = obs.value;
    pillState[dim + 'Ts'] = obs.ts;
    pillState.offline = false;
    if (pillState[pendingKey]) {
      pillState[pendingKey] = null;
      var pillCmds = dim === 'status' ? ['ARM', 'DISARM'] : ['IMMOBILIZE', 'RESTORE'];
      if (pendingAction && pillCmds.indexOf(pendingAction.cmd) >= 0) confirmAction();
    }
    document.getElementById('offline-banner').style.display = 'none';
    renderPills();
  } else if (obs.type === 'kv') {
    // R2: KV poll — per dimension, only if value changed AND fresher
    var changed = false;
    if (obs.statusValue !== pillState.status && obs.ts > pillState.statusTs) {
      pillState.status = obs.statusValue;
      pillState.statusTs = obs.ts;
      changed = true;
      if (pillState.pendingStatus && obs.ts > pillState.pendingStatus.tsAtSend) {
        pillState.pendingStatus = null;
        if (pendingAction && (pendingAction.cmd === 'ARM' || pendingAction.cmd === 'DISARM')) confirmAction();
      }
    }
    if (obs.ignitionValue !== pillState.ignition && obs.ts > pillState.ignitionTs) {
      pillState.ignition = obs.ignitionValue;
      pillState.ignitionTs = obs.ts;
      changed = true;
      if (pillState.pendingIgnition && obs.ts > pillState.pendingIgnition.tsAtSend) {
        pillState.pendingIgnition = null;
        if (pendingAction && (pendingAction.cmd === 'IMMOBILIZE' || pendingAction.cmd === 'RESTORE')) confirmAction();
      }
    }
    if (changed) renderPills();
  } else if (obs.type === 'command') {
    // R3: Command click — set pending, no confident value written
    var pendingKey = obs.dim === 'status' ? 'pendingStatus' : 'pendingIgnition';
    pillState[pendingKey] = { cmd: obs.cmd, sentAt: Date.now(), tsAtSend: pillState[obs.dim + 'Ts'] };
    renderPills();
  } else if (obs.type === 'timeout') {
    // R4: Pending command timed out
    var pendingKey = obs.dim === 'status' ? 'pendingStatus' : 'pendingIgnition';
    var tsKey = obs.dim + 'Ts';
    if (!pillState[pendingKey]) return;
    if (pillState[tsKey] > pillState[pendingKey].tsAtSend) {
      pillState[pendingKey] = null;
    } else {
      pillState[pendingKey] = null;
      pillState[obs.dim] = 'UNKNOWN';
      pillState[tsKey] = 0;
    }
    renderPills();
  } else if (obs.type === 'offline') {
    // R5: Offline — visual override only, status/ignition values preserved
    pillState.offline = true;
    renderPills();
  }
}

function updateLastSeen() {
  const el = document.getElementById('last-seen');
  if (!lastMessageTime) { el.textContent = ''; return; }
  const elapsed = Date.now() - lastMessageTime;
  const mins = Math.floor(elapsed / 60000);
  const hrs = Math.floor(mins / 60);
  if (mins < 1) el.textContent = 'just now';
  else if (mins < 60) el.textContent = mins + 'm ago';
  else if (hrs < 24) el.textContent = hrs + 'h ' + (mins % 60) + 'm ago';
  else el.textContent = Math.floor(hrs / 24) + 'd ago';
  el.className = pillState.offline ? 'last-seen offline' : 'last-seen';
}

function checkOfflineStatus() {
  if (!lastMessageTime) return;
  const elapsed = Date.now() - lastMessageTime;
  if (elapsed > 900000) {
    if (!pillState.offline) applyObservation({type:'offline'});

    const totalMins = Math.floor(elapsed / 60000);
    const hrs = Math.floor(totalMins / 60);
    const mins = totalMins % 60;
    const timeAgo = hrs > 0 ? hrs + 'h ' + mins + 'm ago' : mins + 'm ago';

    const dt = new Date(lastMessageTime);
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var hr = dt.getHours();
    const ampm = hr >= 12 ? 'PM' : 'AM';
    hr = hr % 12 || 12;
    const dateStr = days[dt.getDay()] + ' ' + months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + hr + ':' + String(dt.getMinutes()).padStart(2, '0') + ' ' + ampm;

    var html = 'Last seen ' + timeAgo;
    if (pillState.status !== 'UNKNOWN') html += ' &middot; Was ' + pillState.status;
    html += '<br>Last contact: ' + dateStr;

    var savedGPS = localStorage.getItem('lastGPS');
    if (savedGPS) {
      var parts = savedGPS.split(',');
      if (parts[0] && parts[1]) {
        html += ' &middot; <a href="https://www.google.com/maps?q=' + parts[0] + ',' + parts[1] + '" target="_blank">Last location</a>';
      }
    }

    var banner = document.getElementById('offline-banner');
    banner.innerHTML = html;
    banner.style.display = 'block';
  }
}

function updateMapPosition(lat, lon) {
  if (marker) marker.setLatLng([lat, lon]);
  else marker = L.circleMarker([lat, lon], { radius: 7, color: '#0ea5e9', fillColor: '#0ea5e9', fillOpacity: 0.9, weight: 2 }).addTo(map);
  map.setView([lat, lon], 15);
  localStorage.setItem('lastGPS', lat + ',' + lon);

  gpsTrail.push([lat, lon]);
  if (gpsTrail.length > 50) gpsTrail = gpsTrail.slice(-50);
  localStorage.setItem('gpsTrail', JSON.stringify(gpsTrail));
  if (trailLine) map.removeLayer(trailLine);
  if (gpsTrail.length > 1) {
    trailLine = L.polyline(gpsTrail, { color: '#0ea5e9', weight: 2, opacity: 0.4, dashArray: '4 6' }).addTo(map);
  }
}

function showHeroPhoto(url, title, body, timestamp) {
  var panel = document.getElementById('hero-photo');
  var safeUrl = escapeHtml(url);
  var reason = '';
  if (body.startsWith('ALERT:')) reason = body.split('\n')[0].substring(6).trim();
  else if (title) reason = title;
  var timeStr = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
  var aiBadge = timestamp
    ? ''
    : '<div id="hero-ai-badge" class="ai-badge ai-loading">Analyzing...</div>';
  panel.innerHTML = '<img src="' + safeUrl + '" alt="Photo" onclick="openLightbox(\'' + safeUrl + '\')">' +
    '<div class="ai-overlay">' +
    aiBadge +
    '<div class="photo-meta">' + escapeHtml(timeStr + (reason ? ' \u00b7 ' + reason : '')) + '</div>' +
    '</div>';
}

function parseModemTimestamp(ts) {
  // SIM7600 AT+CCLK? format: YY/MM/DD,HH:MM:SS or YY/MM/DD,HH:MM:SS±zz
  var m = ts.match(/^(\d{2})\/(\d{2})\/(\d{2}),(\d{2}):(\d{2}):(\d{2})([+-]\d{1,2})?$/);
  if (!m) return null;
  var yr = 2000 + parseInt(m[1], 10);
  var mo = parseInt(m[2], 10) - 1;
  var dy = parseInt(m[3], 10);
  var hr = parseInt(m[4], 10);
  var mi = parseInt(m[5], 10);
  var sc = parseInt(m[6], 10);
  if (m[7]) {
    // ±zz is quarter-hour units per 3GPP spec
    var offsetMin = parseInt(m[7], 10) * 15;
    var utcMs = Date.UTC(yr, mo, dy, hr, mi, sc) - offsetMin * 60000;
    return new Date(utcMs);
  }
  // No offset — assume UTC
  return new Date(Date.UTC(yr, mo, dy, hr, mi, sc));
}

function formatBody(text) {
  let s = escapeHtml(text);
  s = s.replace(/\bSMS_REPLY\b/g, 'REPLY');
  // Convert modem timestamps (Time: / TS:) to local time
  s = s.replace(/((?:Time|TS):)\s*(\d{2}\/\d{2}\/\d{2},\d{2}:\d{2}:\d{2}(?:[+-]\d{1,2})?)/g, function(match, label, raw) {
    var d = parseModemTimestamp(raw);
    if (!d) return match;
    return label + ' ' + d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  });
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  s = s.replace(/(^|[\s,])([-]?\d{1,3}\.\d{3,},\s?[-]?\d{1,3}\.\d{3,})/g, function(match, pre, coords) {
    var c = coords.replace(/\s/g, '');
    return pre + '<a href="https://www.google.com/maps?q=' + c + '" target="_blank">' + coords + '</a>';
  });
  return s;
}

function addFeedItem(title, body, priority, attachment, timestamp) {
  const list = document.getElementById('feed-list');

  var placeholder = list.querySelector('.feed-empty');
  if (placeholder) placeholder.remove();

  var wasAtTop = list.scrollTop <= 10;

  const item = document.createElement('div');
  item.className = 'feed-item';
  if (priority >= 5) item.className += ' urgent';

  var d = timestamp ? new Date(timestamp) : new Date();
  var now = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  var html = '<div class="feed-time">' + now + '</div>';
  html += '<div class="feed-content">';
  html += '<div class="feed-reason">' + escapeHtml(title || 'Notification') + '</div>';
  if (body) html += '<div class="feed-body">' + formatBody(body) + '</div>';
  html += '<div class="feed-badges"></div>';
  html += '</div>';

  if (attachment && attachment.url) {
    var safeUrl = escapeHtml(attachment.url);
    html += '<img class="feed-thumb" src="' + safeUrl + '" alt="" data-url="' + safeUrl + '">';
  }

  item.innerHTML = html;

  var thumb = item.querySelector('.feed-thumb');
  if (thumb) {
    thumb.addEventListener('click', function() { openLightbox(this.getAttribute('data-url')); });
  }

  list.insertBefore(item, list.firstChild);
  while (list.children.length > 10) list.removeChild(list.lastChild);

  if (wasAtTop) list.scrollTop = 0;

  return item;
}

function openLightbox(src) {
  const overlay = document.createElement('div');
  overlay.className = 'lightbox';
  overlay.onclick = function() { document.body.removeChild(overlay); };
  overlay.innerHTML = '<img src="' + src + '" alt="Full photo">';
  document.body.appendChild(overlay);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- Speed & Motion ---
function updateSpeedWidget() {
  var numberEl = document.getElementById('speed-number');
  var pillEl = document.getElementById('speed-motion-pill');
  var updatedEl = document.getElementById('speed-updated');
  if (!numberEl) return;

  var isStale = speedUpdatedAt && (Date.now() - speedUpdatedAt > 10 * 60 * 1000);
  var elapsed = speedUpdatedAt ? Math.floor((Date.now() - speedUpdatedAt) / 1000) : null;
  var ms = motionState || 'UNKNOWN';

  // Color logic
  var color;
  if (isStale) {
    color = '#64748b';
  } else if (ms === 'MOVING' || (currentSpeedMph !== null && currentSpeedMph >= 5.0)) {
    color = '#ef4444';
  } else if (currentSpeedMph !== null && currentSpeedMph >= 1.0) {
    color = '#eab308';
  } else if (currentSpeedMph !== null && currentSpeedMph <= 0.9) {
    color = '#22c55e';
  } else if (currentSpeedMph === null && ms === 'STATIONARY') {
    color = '#22c55e';
  } else {
    color = '#64748b';
  }

  numberEl.style.color = color;
  numberEl.textContent = currentSpeedMph !== null ? currentSpeedMph.toFixed(1) : '\u2014';

  // Motion pill
  if (isStale) {
    pillEl.className = 'speed-motion-pill speed-pill-stale';
  } else if (ms === 'STATIONARY') {
    pillEl.className = 'speed-motion-pill speed-pill-stationary';
  } else if (ms === 'MOVING') {
    pillEl.className = 'speed-motion-pill speed-pill-moving';
  } else {
    pillEl.className = 'speed-motion-pill speed-pill-unknown';
  }
  pillEl.textContent = ms.charAt(0) + ms.slice(1).toLowerCase();

  // Updated text
  if (elapsed === null) {
    updatedEl.innerHTML = 'No data';
  } else if (isStale) {
    var mins = Math.floor(elapsed / 60);
    updatedEl.innerHTML = 'Updated ' + mins + 'm ago <span class="speed-stale-sub">(stale)</span>';
  } else {
    if (elapsed < 60) updatedEl.innerHTML = 'Updated ' + elapsed + 's ago';
    else updatedEl.innerHTML = 'Updated ' + Math.floor(elapsed / 60) + 'm ago';
  }
}

function updateSpeedPill() {
  var pill = document.getElementById('speed-pill');
  if (!pill) return;

  var isStale = speedUpdatedAt && (Date.now() - speedUpdatedAt > 10 * 60 * 1000);
  var speedText = currentSpeedMph !== null ? currentSpeedMph.toFixed(1) + ' mph' : '\u2014 mph';
  pill.textContent = speedText;

  if (isStale || !motionState || motionState === 'UNKNOWN') {
    pill.className = 'status-pill pill-speed-gray';
  } else if (motionState === 'MOVING') {
    pill.className = 'status-pill pill-speed-red';
  } else if (motionState === 'STATIONARY') {
    pill.className = 'status-pill pill-speed-green';
  } else {
    pill.className = 'status-pill pill-speed-gray';
  }
}

function updateImmobilizeButton() {
  var btn = document.getElementById('btn-immobilize');
  var warning = document.getElementById('immobilize-warning');
  if (!btn || !warning) return;
  if (pendingAction && pendingAction.cmd === 'IMMOBILIZE') return;

  var isMoving = motionState === 'MOVING' || (currentSpeedMph !== null && currentSpeedMph > 2);
  var isStale = speedUpdatedAt && (Date.now() - speedUpdatedAt > 10 * 60 * 1000);
  var isSensorBlind = (motionState === null || motionState === 'UNKNOWN') && currentSpeedMph === null;

  if (isMoving) {
    btn.disabled = true;
    btn.classList.remove('stale-warn');
    var speedStr = currentSpeedMph !== null ? currentSpeedMph.toFixed(1) : '?';
    var motStr = motionState || 'Unknown';
    warning.textContent = '\u26A0 Cannot immobilize while moving (' + speedStr + ' mph, ' + motStr + '). Wait for the vehicle to come to a complete stop.';
    warning.style.display = 'block';
  } else if (isSensorBlind || isStale) {
    btn.disabled = false;
    btn.classList.add('stale-warn');
    warning.style.display = 'none';
  } else {
    btn.disabled = false;
    btn.classList.remove('stale-warn');
    warning.style.display = 'none';
  }
}

function showSafetyLockout(body) {
  var banner = document.getElementById('safety-lockout-banner');
  var textEl = document.getElementById('safety-lockout-text');
  if (!banner || !textEl) return;

  var speed = '?';
  var time = new Date().toLocaleTimeString();
  var lines = body.split('\n');
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('Speed:')) speed = lines[i].substring(6).trim();
    if (lines[i].startsWith('Time:')) {
      var raw = lines[i].substring(5).trim();
      var parsed = parseModemTimestamp(raw);
      time = parsed ? parsed.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : raw;
    }
  }

  textEl.textContent = '\uD83D\uDEAB Safety lockout \u2014 Immobilize refused at ' + time + ' because vehicle was in motion (' + speed + ').';
  banner.style.display = 'block';

  if (safetyLockoutTimer) clearTimeout(safetyLockoutTimer);
  safetyLockoutTimer = setTimeout(dismissSafetyLockout, 60000);
}

function dismissSafetyLockout() {
  var banner = document.getElementById('safety-lockout-banner');
  if (banner) banner.style.display = 'none';
  if (safetyLockoutTimer) { clearTimeout(safetyLockoutTimer); safetyLockoutTimer = null; }
}

async function analyzePhoto(imageUrl, feedItem) {
  var badges = feedItem.querySelector('.feed-badges');
  if (badges) {
    badges.innerHTML += '<span class="feed-badge ai-loading" data-ai="true">AI analyzing...</span>';
  }
  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: imageUrl })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    var level = data.threatLevel.toLowerCase();
    var cssClass = 'ai-' + level;

    var aiBadge = feedItem.querySelector('[data-ai]');
    if (aiBadge) {
      aiBadge.className = 'feed-badge ' + cssClass;
      aiBadge.textContent = data.threatLevel + ': ' + data.verdict;
    }

    var heroBadge = document.getElementById('hero-ai-badge');
    if (heroBadge) {
      heroBadge.className = 'ai-badge ' + cssClass;
      heroBadge.textContent = data.threatLevel + ': ' + data.verdict;
    }
  } catch (err) {
    var aiBadge = feedItem.querySelector('[data-ai]');
    if (aiBadge) {
      aiBadge.className = 'feed-badge ai-loading';
      aiBadge.textContent = 'AI unavailable';
    }
    var heroBadge = document.getElementById('hero-ai-badge');
    if (heroBadge) {
      heroBadge.className = 'ai-badge ai-loading';
      heroBadge.textContent = 'AI unavailable';
    }
  }
}

let toastTimer = null;
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove('show'); toastTimer = null; }, 3000);
}

// --- Command UI (pill-pending + button-pending in lockstep) ---
var pendingAction = null;
var BTN_PENDING = { ARM: 'Arming\u2026', DISARM: 'Disarming\u2026', GPS: 'Locating\u2026', PHOTO: 'Capturing\u2026', IMMOBILIZE: 'Immobilizing\u2026', RESTORE: 'Restoring\u2026' };

async function sendCommand(cmd, btn) {
  if (pendingAction) return;

  // Safety check for IMMOBILIZE
  if (cmd === 'IMMOBILIZE') {
    var isMoving = motionState === 'MOVING' || (currentSpeedMph !== null && currentSpeedMph > 2);
    if (isMoving) {
      updateImmobilizeButton();
      showToast('Cannot immobilize \u2014 vehicle is moving');
      return;
    }
  }

  var originalText = btn.innerHTML;

  btn.innerHTML = '<span class="spinner"></span>' + BTN_PENDING[cmd];
  btn.classList.add('pending');
  btn.disabled = true;

  // R3: Set pill pending for pill-relevant commands (no optimistic confident value)
  if (cmd === 'ARM' || cmd === 'DISARM')
    applyObservation({type:'command', dim:'status', cmd:cmd});
  else if (cmd === 'IMMOBILIZE' || cmd === 'RESTORE')
    applyObservation({type:'command', dim:'ignition', cmd:cmd});

  pendingAction = { cmd: cmd, btn: btn, originalText: originalText, timer: null };

  // MQTT-first, POST-fallback. Exactly one path per click — never both.
  var sent = false;
  if (mqttClient && mqttClient.connected) {
    try {
      await new Promise(function(resolve, reject) {
        mqttClient.publish(window.MQTT_CONFIG.cmdTopic, cmd, { qos: 1 }, function(err) {
          if (err) reject(err); else resolve();
        });
      });
      sent = true;
      showToast('Command sent: ' + cmd);
    } catch (mqttErr) {
      console.warn('[mqtt] publish failed, falling back to HTTP:', mqttErr);
    }
  }
  if (!sent) {
    try {
      var resp = await fetch(WORKER_URL + '/commands/dispatch', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + CMD_SECRET },
        body: cmd
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      showToast('Command sent: ' + cmd);
    } catch (err) {
      if (cmd === 'ARM' || cmd === 'DISARM')
        applyObservation({type:'timeout', dim:'status'});
      else if (cmd === 'IMMOBILIZE' || cmd === 'RESTORE')
        applyObservation({type:'timeout', dim:'ignition'});
      failAction('Send failed');
      return;
    }
  }

  var cmdTimeout = (cmd === 'IMMOBILIZE' || cmd === 'RESTORE') ? 120000 : 60000;
  pendingAction.timer = setTimeout(function() {
    if (cmd === 'ARM' || cmd === 'DISARM')
      applyObservation({type:'timeout', dim:'status'});
    else if (cmd === 'IMMOBILIZE' || cmd === 'RESTORE')
      applyObservation({type:'timeout', dim:'ignition'});
    failAction('No response');
  }, cmdTimeout);
}

function confirmAction() {
  if (!pendingAction) return;
  clearTimeout(pendingAction.timer);
  var p = pendingAction;
  pendingAction = null;
  p.btn.classList.remove('pending');
  p.btn.disabled = false;
  p.btn.innerHTML = p.originalText;
  updateImmobilizeButton();
  // Confirm flash after renderPills sets className
  var pillId = (p.cmd === 'IMMOBILIZE' || p.cmd === 'RESTORE') ? 'ignition-pill' : 'status-pill';
  setTimeout(function() {
    var pill = document.getElementById(pillId);
    pill.classList.add('confirming');
    setTimeout(function() { pill.classList.remove('confirming'); }, 600);
  }, 0);
}

function failAction(reason) {
  if (!pendingAction) return;
  clearTimeout(pendingAction.timer);
  var p = pendingAction;
  pendingAction = null;
  p.btn.classList.remove('pending');
  p.btn.classList.add('failed');
  p.btn.disabled = false;
  p.btn.innerHTML = reason + ' \u2014 retry';
  p.btn.onclick = function() {
    p.btn.classList.remove('failed');
    p.btn.innerHTML = p.originalText;
    p.btn.onclick = function() { sendCommand(p.cmd, p.btn); };
    sendCommand(p.cmd, p.btn);
  };
  updateImmobilizeButton();
}

// --- Two-step Confirm Dialog ---
function showConfirmDialog(message, onConfirm, warningText) {
  var dialog = document.getElementById('confirm-dialog');
  var warningEl = document.getElementById('confirm-warning');
  if (warningText) {
    warningEl.textContent = warningText;
    warningEl.style.display = 'block';
  } else {
    warningEl.style.display = 'none';
  }
  document.getElementById('confirm-text').textContent = message;
  dialog.style.display = 'flex';
  document.getElementById('confirm-yes').onclick = function() {
    dialog.style.display = 'none';
    onConfirm();
  };
  document.getElementById('confirm-no').onclick = function() {
    dialog.style.display = 'none';
  };
}

function confirmImmobilize() {
  if (pendingAction) return;

  var isMoving = motionState === 'MOVING' || (currentSpeedMph !== null && currentSpeedMph > 2);
  if (isMoving) {
    updateImmobilizeButton();
    return;
  }

  var isStale = speedUpdatedAt && (Date.now() - speedUpdatedAt > 10 * 60 * 1000);
  var isSensorBlind = (motionState === null || motionState === 'UNKNOWN') && currentSpeedMph === null;
  var warningText = '';
  if (isSensorBlind) {
    warningText = '\u26A0 No speed/motion data received yet. Confirm vehicle is stationary?';
  } else if (isStale) {
    var minsAgo = Math.floor((Date.now() - speedUpdatedAt) / 60000);
    warningText = '\u26A0 Speed data is ' + minsAgo + ' minutes old. Confirm vehicle is stationary?';
  }

  showConfirmDialog("Are you sure? This will cut the vehicle's ignition.", function() {
    // Re-check at confirm time
    var stillMoving = motionState === 'MOVING' || (currentSpeedMph !== null && currentSpeedMph > 2);
    if (stillMoving) {
      updateImmobilizeButton();
      showToast('Immobilize aborted \u2014 vehicle is now moving');
      return;
    }
    // Audit snapshot in events feed
    addFeedItem('Immobilize Dispatched',
      'Safety check passed\nSpeed: ' + (currentSpeedMph !== null ? currentSpeedMph.toFixed(1) : '\u2014') + ' mph\nMotion: ' + (motionState || 'Unknown'),
      2, null, null);
    sendCommand('IMMOBILIZE', document.getElementById('btn-immobilize'));
  }, warningText || undefined);
}

function confirmRestore() {
  if (pendingAction) return;
  showConfirmDialog("Are you sure? This will restore the vehicle's ignition.", function() {
    sendCommand('RESTORE', document.getElementById('btn-restore'));
  });
}
